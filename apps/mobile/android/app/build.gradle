apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

/**
 * This is the configuration block to customize your React Native Android app.
 * By default you don't need to apply any configuration, just uncomment the lines you need.
 */
react {
    /* Folders — pnpm monorepo: node_modules hoisted to workspace root */
    root = file("../..")
    reactNativeDir = file("../../../../node_modules/react-native")
    codegenDir = file("../../../../node_modules/@react-native/codegen")
    cliFile = file("../../../../node_modules/react-native/cli.js")

    /* Variants */
    //   The list of variants to that are debuggable. For those we're going to
    //   skip the bundling of the JS bundle and the assets. By default is just 'debug'.
    //   If you add flavors like lite, prod, etc. you'll have to list your debuggableVariants.
    // debuggableVariants = ["liteDebug", "prodDebug"]

    /* Bundling */
    //   A list containing the node command and its flags. Default is just 'node'.
    // nodeExecutableAndArgs = ["node"]
    //
    //   The command to run when bundling. By default is 'bundle'
    // bundleCommand = "ram-bundle"
    //
    //   The path to the CLI configuration file. Default is empty.
    // bundleConfig = file(../rn-cli.config.js)
    //
    //   The name of the generated asset file containing your JS bundle
    // bundleAssetName = "MyApplication.android.bundle"
    //
    //   The entry file for bundle generation. Default is 'index.android.js' or 'index.js'
    // entryFile = file("../js/MyApplication.android.js")
    entryFile = file("../../index.js")
    //
    //   A list of extra flags to pass to the 'bundle' commands.
    //   See https://github.com/react-native-community/cli/blob/main/docs/commands.md#bundle
    // extraPackagerArgs = []

    /* Hermes Commands */
    //   The hermes compiler command to run. By default it is 'hermesc'
    // hermesCommand = "$rootDir/my-custom-hermesc/bin/hermesc"
    //
    //   The list of flags to pass to the Hermes compiler. By default is "-O", "-output-source-map"
    // hermesFlags = ["-O", "-output-source-map"]

    /* Autolinking */
    autolinkLibrariesWithApp()
}

def readConfiguredValue = { List<String> propertyNames, List<String> envNames ->
    for (String propertyName : propertyNames) {
        def propertyValue = project.findProperty(propertyName)
        if (propertyValue != null && propertyValue.toString().trim()) {
            return propertyValue.toString().trim()
        }
    }

    for (String envName : envNames) {
        def envValue = System.getenv(envName)
        if (envValue != null && envValue.toString().trim()) {
            return envValue.toString().trim()
        }
    }

    return null
}

def readConfiguredBoolean = { List<String> propertyNames, List<String> envNames, boolean defaultValue ->
    def configuredValue = readConfiguredValue(propertyNames, envNames)
    return configuredValue == null ? defaultValue : configuredValue.toBoolean()
}

def releaseStoreFilePath = readConfiguredValue(
    ['tempotune.release.storeFile'],
    ['TEMPO_TUNE_RELEASE_STORE_FILE']
)
def releaseStorePassword = readConfiguredValue(
    ['tempotune.release.storePassword'],
    ['TEMPO_TUNE_RELEASE_STORE_PASSWORD']
)
def releaseKeyAlias = readConfiguredValue(
    ['tempotune.release.keyAlias'],
    ['TEMPO_TUNE_RELEASE_KEY_ALIAS']
)
def releaseKeyPassword = readConfiguredValue(
    ['tempotune.release.keyPassword'],
    ['TEMPO_TUNE_RELEASE_KEY_PASSWORD']
)

def hasReleaseSigning = [
    releaseStoreFilePath,
    releaseStorePassword,
    releaseKeyAlias,
    releaseKeyPassword,
].every { value -> value != null && value.length() > 0 }

def allowDebugReleaseSigning = readConfiguredBoolean(
    ['tempotune.allowDebugReleaseSigning'],
    ['TEMPO_TUNE_ALLOW_DEBUG_RELEASE_SIGNING'],
    false
)
def enableProguardInReleaseBuilds = readConfiguredBoolean(
    ['tempotune.enableMinifyInRelease'],
    ['TEMPO_TUNE_ENABLE_MINIFY_IN_RELEASE'],
    true
)
def enableShrinkResourcesInReleaseBuilds = readConfiguredBoolean(
    ['tempotune.enableShrinkResourcesInRelease'],
    ['TEMPO_TUNE_ENABLE_SHRINK_RESOURCES_IN_RELEASE'],
    enableProguardInReleaseBuilds
)
def releaseTasksRequested = gradle.startParameter.taskNames.any { taskName ->
    taskName.toLowerCase().contains('release')
}
def qaUseDevWebUrl = readConfiguredBoolean(
    ['tempotune.qa.useDevWebUrl'],
    ['QA_USE_DEV_WEB_URL'],
    false
)
def qaEnableWebviewDebugging = readConfiguredBoolean(
    ['tempotune.qa.enableWebviewDebugging'],
    ['QA_ENABLE_WEBVIEW_DEBUGGING'],
    false
)
def qaWebUrl = readConfiguredValue(
    ['tempotune.qa.webUrl'],
    ['QA_WEB_URL']
)
def explicitRuntimeChannel = readConfiguredValue(
    ['tempotune.runtimeChannel'],
    ['APP_RUNTIME_CHANNEL']
)
def releaseChannel = (
    readConfiguredValue(
        ['tempotune.release.channel'],
        ['TEMPO_TUNE_RELEASE_CHANNEL']
    ) ?: 'production'
).toLowerCase()
def allowQaReleaseBuild = readConfiguredBoolean(
    ['tempotune.allowQaRelease'],
    ['TEMPO_TUNE_ALLOW_QA_RELEASE'],
    false
)
def qaRuntimeRequested =
    allowDebugReleaseSigning ||
    qaUseDevWebUrl ||
    qaEnableWebviewDebugging ||
    (qaWebUrl != null && qaWebUrl.length() > 0)

if (releaseTasksRequested) {
    if (!(releaseChannel in ['production', 'qa'])) {
        throw new GradleException(
            "TEMPO_TUNE_RELEASE_CHANNEL must be 'production' or 'qa' for release builds (got '${releaseChannel}')."
        )
    }

    if (releaseChannel == 'qa' && !allowQaReleaseBuild) {
        throw new GradleException(
            "QA release build requested without TEMPO_TUNE_ALLOW_QA_RELEASE=1."
        )
    }
}

def runtimeChannel = releaseTasksRequested
    ? releaseChannel
    : (explicitRuntimeChannel ?: (qaRuntimeRequested ? 'qa' : 'development'))

def generateTempoTuneRuntimeConfig = tasks.register("generateTempoTuneRuntimeConfig", Exec) {
    workingDir file("${rootDir}/..")
    commandLine "bash", "scripts/generate-dev-config.sh"
    environment "APP_RUNTIME_CHANNEL", runtimeChannel

    if (runtimeChannel == 'production') {
        environment "QA_USE_DEV_WEB_URL", "0"
        environment "QA_ENABLE_WEBVIEW_DEBUGGING", "0"
        environment "QA_WEB_URL", ""
    }
}

def verifyTempoTuneProductionRuntime = tasks.register("verifyTempoTuneProductionRuntime", Exec) {
    workingDir file("${rootDir}/..")
    commandLine "bash", "scripts/verify-production-runtime-config.sh"
    onlyIf { releaseTasksRequested && runtimeChannel == 'production' }
}

tasks.named("preBuild").configure {
    dependsOn(generateTempoTuneRuntimeConfig)
    dependsOn(verifyTempoTuneProductionRuntime)
}

/**
 * The preferred build flavor of JavaScriptCore (JSC)
 *
 * For example, to use the international variant, you can use:
 * `def jscFlavor = io.github.react-native-community:jsc-android-intl:2026004.+`
 *
 * The international variant includes ICU i18n library and necessary data
 * allowing to use e.g. `Date.toLocaleString` and `String.localeCompare` that
 * give correct results when using with locales other than en-US. Note that
 * this variant is about 6MiB larger per architecture than default.
 */
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.tempotune"
    defaultConfig {
        applicationId "com.tempotune"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        if (hasReleaseSigning) {
            release {
                storeFile file(releaseStoreFilePath)
                storePassword releaseStorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            }
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            if (hasReleaseSigning) {
                signingConfig signingConfigs.release
            } else if (allowDebugReleaseSigning) {
                // QA automation may opt into a debug-signed release APK explicitly.
                signingConfig signingConfigs.debug
            } else if (releaseTasksRequested) {
                throw new GradleException(
                    'Release signing is not configured. Set TEMPO_TUNE_RELEASE_STORE_FILE, ' +
                    'TEMPO_TUNE_RELEASE_STORE_PASSWORD, TEMPO_TUNE_RELEASE_KEY_ALIAS, and ' +
                    'TEMPO_TUNE_RELEASE_KEY_PASSWORD before building a production release.'
                )
            }
            minifyEnabled enableProguardInReleaseBuilds
            shrinkResources enableShrinkResourcesInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    // The version of react-native is set by the React Native Gradle Plugin
    implementation("com.facebook.react:react-android")

    // MediaSession for lock screen / hardware button transport controls
    implementation "androidx.media:media:1.7.0"

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}
